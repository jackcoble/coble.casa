---
- name: Install bzip2
  package:
    name: bzip2
    state: present

- name: Download Restic
  get_url:
    url: https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_amd64.bz2
    dest: /tmp/restic_{{ restic_version }}_linux_amd64.bz2
    mode: '0644'

- name: Extract Restic
  shell: bunzip2 -c /tmp/restic_{{ restic_version }}_linux_amd64.bz2 > /tmp/restic
  args:
    creates: /tmp/restic

- name: Copy Restic to system path
  copy:
    src: /tmp/restic
    dest: /usr/local/bin/restic
    mode: '0755'
    remote_src: yes

- name: Clean up temporary files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/restic_{{ restic_version }}_linux_amd64.bz2
    - /tmp/restic